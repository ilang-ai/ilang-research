baseURL: "https://research.ilang.ai/"
title: I-Lang Research
theme: PaperMod
enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20
taxonomies:
    tag: tags
menu:
    main:
        - name: Papers
          url: papers/
          weight: 1
        - name: Protocol
          url: protocol/
          weight: 2
        - name: Open Source
          url: opensource/
          weight: 3
        - name: Archive
          url: archive/
          weight: 4
params:
    description: "I-Lang Research — AI-native compression protocol research. A division of Eastsoft Inc., Canada."
    author: I-Lang Research
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["papers","protocol","opensource"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: I-Lang Research
          subtitle: "AI-native compression protocol research. We design communication standards between humans and AI systems — reducing friction, maximizing efficiency, preserving meaning. A division of Eastsoft Inc., Canada."
          imageUrl: ""
          imageWidth: 0
          imageHeight: 0
          buttons:
            - name: Papers
              url: papers/
            - name: Protocol
              url: protocol/
            - name: Open Source
              url: opensource/
            - name: Tags
              url: tags/
            - name: Archive
              url: archive/
    socialIcons:
        - name: Email
          url: mailto:info@ilang.ai
        - name: GitHub
          url: https://github.com/ilang-ai
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=YOUR_ID
        - name: orcid
          url: https://orcid.org/0009-0004-4540-8082
    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "I-Lang Research"
      icon: favicon.ico
      iconHeight: 18
markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2
